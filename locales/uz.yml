  desc3: Dasturlash va hayot sherigini topishga harakat qilishdan tashqari, men Dota 2 ni yaxshi ko'raman, palov va sushini yaxshi ko'raman :)
  moon: Oyim juda afsusdaman, lekin bu majburiy chora edi, boshqa yo'l yo'q edi.
